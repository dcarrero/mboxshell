name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same branch/PR to save Actions minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Run bundled JavaScript actions (checkout, upload/download-artifact) on
  # Node 24. Their v5 releases still ship Node 20, deprecated by GitHub and
  # forced to Node 24 from 2026-06-02. This opts in early.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # fmt and clippy are platform-independent; run them once on the cheapest
  # runner instead of across the whole OS matrix.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --locked -- -D warnings
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --locked
